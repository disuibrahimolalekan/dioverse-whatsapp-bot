<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dioverse Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --black: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --off-white: #f4f1ec;
    --gray: #888;
    --light-gray: #c8c4bc;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'DM Sans', -apple-system, sans-serif;
    height: 100vh;
    overflow: hidden;
  }

  /* ── LOGIN ── */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    background: var(--black);
  }

  .login-box {
    width: 320px;
    padding: 40px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-align: center;
  }

  .login-logo {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    margin-bottom: 6px;
  }

  .login-logo span { color: var(--green); }

  .login-sub {
    font-size: 0.8rem;
    color: var(--gray);
    margin-bottom: 32px;
  }

  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 2px;
  }

  .login-input:focus { border-color: rgba(37,211,102,0.4); }

  .login-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }

  .login-btn:hover { background: #20c45e; }

  .login-error {
    color: #ff6b6b;
    font-size: 0.78rem;
    margin-top: 10px;
    display: none;
  }

  /* ── APP ── */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .header-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
  }

  .header-logo span { color: var(--green); }

  .header-badge {
    background: rgba(37,211,102,0.15);
    color: var(--green);
    font-size: 0.68rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 100px;
    border: 1px solid rgba(37,211,102,0.2);
  }

  /* Main layout */
  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* Conversation list */
  .conv-list {
    width: 100%;
    max-width: 360px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    background: var(--surface);
  }

  .conv-list-header {
    padding: 16px 20px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 0.7rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--surface);
    z-index: 1;
  }

  .conv-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(37,211,102,0.07); border-left: 3px solid var(--green); }

  .conv-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 0.85rem;
    color: white;
    flex-shrink: 0;
  }

  .conv-info { flex: 1; min-width: 0; }

  .conv-name {
    font-weight: 500;
    font-size: 0.88rem;
    margin-bottom: 3px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-preview {
    font-size: 0.75rem;
    color: var(--gray);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .conv-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 4px;
    flex-shrink: 0;
  }

  .conv-time {
    font-size: 0.68rem;
    color: var(--gray);
  }

  .conv-unread {
    background: var(--green);
    color: #000;
    font-size: 0.65rem;
    font-weight: 700;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .empty-state {
    padding: 48px 24px;
    text-align: center;
    color: var(--gray);
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* Chat panel */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--black);
  }

  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gray);
    font-size: 0.85rem;
    gap: 12px;
  }

  .chat-empty-icon {
    font-size: 2.5rem;
    opacity: 0.3;
  }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  .chat-header-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: var(--green-dark);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 600;
    color: white;
  }

  .chat-header-name {
    font-weight: 500;
    font-size: 0.92rem;
  }

  .chat-header-phone {
    font-size: 0.72rem;
    color: var(--gray);
  }

  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .msg {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 14px;
    font-size: 0.85rem;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.customer {
    background: var(--surface2);
    border: 1px solid var(--border);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .msg.bot {
    background: rgba(37,211,102,0.12);
    border: 1px solid rgba(37,211,102,0.15);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg.agent {
    background: var(--green);
    color: #000;
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .msg-time {
    font-size: 0.62rem;
    color: var(--gray);
    margin-top: 4px;
    text-align: right;
  }

  .msg.customer + .msg-time { text-align: left; }

  .msg-label {
    font-size: 0.62rem;
    color: var(--gray);
    text-align: center;
    margin: 8px 0 4px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }

  /* Reply box */
  .reply-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 14px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .reply-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 12px 16px;
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }

  .reply-input:focus { border-color: rgba(37,211,102,0.35); }
  .reply-input::placeholder { color: var(--gray); }

  .send-btn {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.1s;
  }

  .send-btn:hover { background: #20c45e; }
  .send-btn:active { transform: scale(0.95); }

  .send-btn svg {
    width: 18px;
    height: 18px;
    fill: #000;
  }

  /* Mobile - show list or chat */
  @media (max-width: 640px) {
    .conv-list { max-width: 100%; border-right: none; }
    .chat-panel { display: none; }
    .conv-list.hidden { display: none; }
    .chat-panel.visible { display: flex; width: 100%; }
    .back-btn { display: flex !important; }
  }

  .back-btn {
    display: none;
    align-items: center;
    gap: 6px;
    background: none;
    border: none;
    color: var(--green);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0;
    margin-right: 4px;
    font-family: 'DM Sans', sans-serif;
  }

  .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Dio<span>verse</span></div>
    <div class="login-sub">Inbox — Agent Access</div>
    <input type="password" class="login-input" id="passwordInput" placeholder="Enter password" />
    <button class="login-btn" onclick="login()">Open Inbox</button>
    <div class="login-error" id="loginError">Wrong password. Try again.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="header">
    <div class="header-logo">Dio<span>verse</span> Inbox</div>
    <div class="header-badge" id="convCount">0 conversations</div>
  </div>

  <div class="main">
    <!-- Conversation List -->
    <div class="conv-list" id="convList">
      <div class="conv-list-header">Conversations</div>
      <div id="convItems">
        <div class="empty-state">No conversations yet.<br>Waiting for messages...</div>
      </div>
    </div>

    <!-- Chat Panel -->
    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div>Select a conversation to view messages</div>
      </div>

      <div id="chatContent" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" onclick="showList()">
            <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>
            Back
          </button>
          <div class="chat-header-avatar" id="chatAvatar"></div>
          <div>
            <div class="chat-header-name" id="chatName"></div>
            <div class="chat-header-phone" id="chatPhone"></div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="reply-box">
          <textarea class="reply-input" id="replyInput" placeholder="Type a message..." rows="1"
            onkeydown="handleKey(event)"
            oninput="this.style.height='auto'; this.style.height=this.scrollHeight+'px'"></textarea>
          <button class="send-btn" onclick="sendReply()">
            <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22 11 13 2 9l20-7z"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const BASE = '';
  let password = '';
  let currentPhone = null;
  let pollInterval = null;

  // ── LOGIN ──
  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pwd = document.getElementById('passwordInput').value;
    const res = await fetch('/inbox/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (data.success) {
      password = pwd;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadConversations();
      pollInterval = setInterval(loadConversations, 5000);
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  // ── LOAD CONVERSATIONS ──
  async function loadConversations() {
    try {
      const res = await fetch('/inbox/conversations');
      const list = await res.json();
      document.getElementById('convCount').textContent = `${list.length} conversation${list.length !== 1 ? 's' : ''}`;
      const container = document.getElementById('convItems');

      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">No conversations yet.<br>Waiting for messages...</div>';
        return;
      }

      container.innerHTML = list.map(c => `
        <div class="conv-item ${c.phone === currentPhone ? 'active' : ''}" onclick="openChat('${c.phone}')">
          <div class="conv-avatar">${getInitials(c.name)}</div>
          <div class="conv-info">
            <div class="conv-name">${c.name}</div>
            <div class="conv-preview">${c.lastMessage}</div>
          </div>
          <div class="conv-meta">
            <div class="conv-time">${formatTime(c.lastTime)}</div>
            ${c.unread > 0 ? `<div class="conv-unread">${c.unread}</div>` : ''}
          </div>
        </div>
      `).join('');

      if (currentPhone) loadMessages(currentPhone);
    } catch (e) {}
  }

  // ── OPEN CHAT ──
  async function openChat(phone) {
    currentPhone = phone;

    // Mobile: show chat panel
    document.getElementById('convList').classList.add('hidden');
    document.getElementById('chatPanel').classList.add('visible');

    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatContent').style.display = 'flex';

    document.getElementById('chatPhone').textContent = '+' + phone;
    loadMessages(phone);
    loadConversations();
  }

  async function loadMessages(phone) {
    try {
      const res = await fetch(`/inbox/conversation/${phone}`);
      const data = await res.json();

      document.getElementById('chatAvatar').textContent = getInitials(data.name || 'Unknown');
      document.getElementById('chatName').textContent = data.name || 'Unknown';

      const container = document.getElementById('chatMessages');
      container.innerHTML = (data.messages || []).map(m => `
        <div>
          <div class="msg ${m.sender}">${escapeHtml(m.text)}</div>
          <div class="msg-time">${formatTime(m.time)}</div>
        </div>
      `).join('');

      container.scrollTop = container.scrollHeight;
    } catch (e) {}
  }

  // ── SEND REPLY ──
  async function sendReply() {
    const input = document.getElementById('replyInput');
    const message = input.value.trim();
    if (!message || !currentPhone) return;

    input.value = '';
    input.style.height = 'auto';

    try {
      await fetch('/inbox/reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: currentPhone, message })
      });
      loadMessages(currentPhone);
    } catch (e) {}
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendReply();
    }
  }

  function showList() {
    document.getElementById('convList').classList.remove('hidden');
    document.getElementById('chatPanel').classList.remove('visible');
    currentPhone = null;
  }

  // ── HELPERS ──
  function getInitials(name) {
    if (!name || name === 'Unknown' || name === 'there') return '?';
    return name.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function formatTime(time) {
    const d = new Date(time);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    if (isToday) return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

</body>
  </html>
