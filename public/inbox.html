<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Dioverse Inbox</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --green: #25D366;
    --green-dark: #128C7E;
    --black: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --border: rgba(255,255,255,0.07);
    --off-white: #f4f1ec;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--black);
    color: var(--off-white);
    font-family: 'DM Sans', -apple-system, sans-serif;
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* LOGIN */
  #loginScreen {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }
  .login-box {
    width: 320px;
    padding: 40px 32px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    text-align: center;
  }
  .login-logo { font-family: 'Syne', sans-serif; font-size: 1.6rem; font-weight: 800; margin-bottom: 6px; }
  .login-logo span { color: var(--green); }
  .login-sub { font-size: 0.8rem; color: var(--gray); margin-bottom: 32px; }
  .login-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    outline: none;
    margin-bottom: 12px;
    text-align: center;
    letter-spacing: 2px;
  }
  .login-input:focus { border-color: rgba(37,211,102,0.4); }
  .login-btn {
    width: 100%;
    background: var(--green);
    color: #000;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
  }
  .login-error { color: #ff6b6b; font-size: 0.78rem; margin-top: 10px; display: none; }

  /* APP LAYOUT */
  #app { display: none; height: 100vh; flex-direction: column; }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .header-logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 1rem; }
  .header-logo span { color: var(--green); }
  .header-client { font-size: 0.72rem; color: var(--gray); margin-top: 2px; }
  .header-badge {
    background: rgba(37,211,102,0.15);
    color: var(--green);
    font-size: 0.68rem;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 100px;
    border: 1px solid rgba(37,211,102,0.2);
  }

  .main { display: flex; flex: 1; overflow: hidden; }

  /* CONVERSATION LIST */
  .conv-list {
    width: 100%;
    max-width: 340px;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    flex-shrink: 0;
    background: var(--surface);
    display: flex;
    flex-direction: column;
  }
  .conv-list-header {
    padding: 14px 20px 10px;
    font-family: 'Syne', sans-serif;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--gray);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .conv-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .conv-item:hover { background: var(--surface2); }
  .conv-item.active { background: rgba(37,211,102,0.07); border-left: 3px solid var(--green); }
  .conv-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 0.88rem; color: white;
    flex-shrink: 0;
  }
  .conv-info { flex: 1; min-width: 0; }
  .conv-name { font-weight: 500; font-size: 0.88rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-preview { font-size: 0.74rem; color: var(--gray); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .conv-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .conv-time { font-size: 0.67rem; color: var(--gray); }
  .conv-unread {
    background: var(--green); color: #000;
    font-size: 0.65rem; font-weight: 700;
    min-width: 18px; height: 18px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    padding: 0 4px;
  }
  .empty-state { padding: 48px 24px; text-align: center; color: var(--gray); font-size: 0.85rem; line-height: 1.7; }

  /* CHAT PANEL */
  .chat-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #0d0d0d;
  }
  .chat-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--gray);
    font-size: 0.85rem;
    gap: 12px;
  }
  .chat-empty-icon { font-size: 2.5rem; opacity: 0.3; }

  .chat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .chat-header-avatar {
    width: 38px; height: 38px;
    border-radius: 50%;
    background: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.78rem; font-weight: 600; color: white;
  }
  .chat-header-name { font-weight: 500; font-size: 0.92rem; }
  .chat-header-phone { font-size: 0.7rem; color: var(--gray); }

  /* MESSAGES - WhatsApp style */
  .chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .msg-row {
    display: flex;
    margin-bottom: 2px;
  }
  .msg-row.left { justify-content: flex-start; }
  .msg-row.right { justify-content: flex-end; }

  .msg-bubble {
    max-width: 72%;
    padding: 9px 12px 6px;
    border-radius: 12px;
    font-size: 0.85rem;
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    position: relative;
  }

  /* Customer - left, clearly visible */
  .msg-row.left .msg-bubble {
    background: #2a2a2a;
    border: 1px solid rgba(255,255,255,0.12);
    border-top-left-radius: 3px;
    color: #f0ede8;
  }

  /* Bot - right, green tint */
  .msg-row.right.bot .msg-bubble {
    background: #0d2e1a;
    border: 1px solid rgba(37,211,102,0.15);
    border-top-right-radius: 3px;
    color: #d4f7e2;
  }

  /* Agent - right, solid green */
  .msg-row.right.agent .msg-bubble {
    background: #1a4a2a;
    border: 1px solid rgba(37,211,102,0.3);
    border-top-right-radius: 3px;
    color: #e8fdf0;
  }

  .msg-time {
    font-size: 0.62rem;
    color: rgba(255,255,255,0.35);
    margin-top: 3px;
    text-align: right;
    display: block;
  }
  .msg-row.left .msg-time { text-align: left; }

  .msg-label {
    font-size: 0.6rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 2px;
    opacity: 0.5;
  }

  /* REPLY BOX */
  .reply-box {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    padding: 12px 14px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    min-height: 68px;
  }
  .reply-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 11px 16px;
    color: var(--off-white);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.88rem;
    outline: none;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  .reply-input:focus { border-color: rgba(37,211,102,0.35); }
  .reply-input::placeholder { color: var(--gray); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--green);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .send-btn:active { transform: scale(0.93); background: #1fb355; }
  .send-btn svg { width: 18px; height: 18px; fill: none; stroke: #000; stroke-width: 2.5; }

  /* MOBILE */
  @media (max-width: 640px) {
    .conv-list { max-width: 100%; border-right: none; }
    .chat-panel { display: none; }
    .conv-list.hidden { display: none; }
    .chat-panel.visible { display: flex; width: 100%; }
    .back-btn { display: flex !important; }
  }

  .back-btn {
    display: none;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    color: var(--green);
    font-size: 0.85rem;
    cursor: pointer;
    padding: 0;
    margin-right: 6px;
    font-family: 'DM Sans', sans-serif;
  }
  .back-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2.5; }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">Dio<span>verse</span></div>
    <div class="login-sub">Inbox — Business Access</div>
    <div style="position:relative; margin-bottom:12px;">
      <input type="password" class="login-input" id="passwordInput" placeholder="Enter your password" style="margin-bottom:0; padding-right:44px;" />
      <button onclick="togglePwd()" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#888;" id="eyeBtn">
        <svg id="eyeIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="login-btn" onclick="login()">Open Inbox</button>
    <div class="login-error" id="loginError">Wrong password. Try again.</div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div>
      <div class="header-logo">Dio<span>verse</span> Inbox</div>
      <div class="header-client" id="headerClient"></div>
    </div>
    <div class="header-badge" id="convCount">0 conversations</div>
  </div>

  <div class="main">
    <div class="conv-list" id="convList">
      <div class="conv-list-header">Conversations</div>
      <div id="convItems"><div class="empty-state">No conversations yet.<br>Waiting for messages...</div></div>
    </div>

    <div class="chat-panel" id="chatPanel">
      <div class="chat-empty" id="chatEmpty">
        <div class="chat-empty-icon">💬</div>
        <div>Select a conversation</div>
      </div>

      <div id="chatContent" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="chat-header">
          <button class="back-btn" onclick="showList()">
            <svg viewBox="0 0 24 24"><polyline points="15,18 9,12 15,6"/></svg>Back
          </button>
          <div class="chat-header-avatar" id="chatAvatar"></div>
          <div>
            <div class="chat-header-name" id="chatName"></div>
            <div class="chat-header-phone" id="chatPhone"></div>
          </div>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <div class="reply-box">
          <textarea class="reply-input" id="replyInput" placeholder="Type a message..." rows="1"
            onkeydown="handleKey(event)"
            oninput="this.style.height='auto'; this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button class="send-btn" onclick="sendReply()">
            <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  let currentPhone = null;
  let currentClientId = null;
  let isUserScrolling = false;
  let scrollTimeout = null;

  // Restore session on page load
  window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('dioverseSession');
    if (saved) {
      const s = JSON.parse(saved);
      currentClientId = s.clientId;
      document.getElementById('headerClient').textContent = s.clientName;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadConversations();
      setInterval(loadConversations, 5000);
    }
  });

  function togglePwd() {
    const input = document.getElementById('passwordInput');
    const icon = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
    } else {
      input.type = 'password';
      icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
    }
  }

  document.getElementById('passwordInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pwd = document.getElementById('passwordInput').value;
    const res = await fetch('/inbox/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pwd })
    });
    const data = await res.json();
    if (data.success) {
      currentClientId = data.clientId;
      sessionStorage.setItem('dioverseSession', JSON.stringify({ clientId: data.clientId, clientName: data.clientName }));
      document.getElementById('headerClient').textContent = data.clientName;
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      loadConversations();
      setInterval(loadConversations, 5000);
    } else {
      document.getElementById('loginError').style.display = 'block';
    }
  }

  async function loadConversations() {
    try {
      const res = await fetch(`/inbox/conversations/${currentClientId}`);
      const list = await res.json();
      document.getElementById('convCount').textContent = `${list.length} conversation${list.length !== 1 ? 's' : ''}`;
      const container = document.getElementById('convItems');
      if (list.length === 0) {
        container.innerHTML = '<div class="empty-state">No conversations yet.<br>Waiting for messages...</div>';
        return;
      }
      container.innerHTML = list.map(c => `
        <div class="conv-item ${c.phone === currentPhone ? 'active' : ''}" onclick="openChat('${c.phone}', '${escapeHtml(c.name || 'Unknown')}')">
          <div class="conv-avatar">${getInitials(c.name)}</div>
          <div class="conv-info">
            <div class="conv-name">${escapeHtml(c.name || 'Unknown')}</div>
            <div class="conv-preview">${escapeHtml(c.lastMessage || '')}</div>
          </div>
          <div class="conv-meta">
            <div class="conv-time">${formatTime(c.lastTime)}</div>
            ${c.unread > 0 ? `<div class="conv-unread">${c.unread}</div>` : ''}
          </div>
        </div>
      `).join('');

      // Refresh current chat if open
      if (currentPhone) loadMessages(currentPhone, false);
    } catch (e) {}
  }

  async function openChat(phone, name) {
    currentPhone = phone;
    isUserScrolling = false;
    document.getElementById('convList').classList.add('hidden');
    document.getElementById('chatPanel').classList.add('visible');
    document.getElementById('chatEmpty').style.display = 'none';
    document.getElementById('chatContent').style.display = 'flex';
    document.getElementById('chatPhone').textContent = '+' + phone;
    document.getElementById('chatAvatar').textContent = getInitials(name);
    document.getElementById('chatName').textContent = name;
    loadMessages(phone, true);
    loadConversations();
  }

  async function loadMessages(phone, scrollToBottom) {
    try {
      const res = await fetch(`/inbox/conversation/${currentClientId}/${phone}`);
      const data = await res.json();
      const container = document.getElementById('chatMessages');

      // Track scroll position before update
      const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;

      // Update header name if we have a real name
      if (data.name && data.name !== 'Unknown' && data.name !== 'there') {
        document.getElementById('chatName').textContent = data.name;
        document.getElementById('chatAvatar').textContent = getInitials(data.name);
      }

      container.innerHTML = (data.messages || []).map(m => {
        const isLeft = m.sender === 'customer';
        const rowClass = isLeft ? 'left' : `right ${m.sender}`;
        const senderLabel = m.sender === 'bot' ? 'Bot' : m.sender === 'agent' ? 'You' : '';
        return `
          <div class="msg-row ${rowClass}">
            <div class="msg-bubble">
              ${senderLabel ? `<div class="msg-label">${senderLabel}</div>` : ''}
              ${escapeHtml(m.text)}
              <span class="msg-time">${formatTime(m.time)}</span>
            </div>
          </div>
        `;
      }).join('');

      // Only scroll to bottom if user was already at bottom or this is first load
      if (scrollToBottom || wasAtBottom) {
        container.scrollTop = container.scrollHeight;
      }
    } catch (e) {}
  }

  async function sendReply() {
    const input = document.getElementById('replyInput');
    const message = input.value.trim();
    if (!message || !currentPhone) return;
    input.value = '';
    input.style.height = 'auto';
    try {
      await fetch('/inbox/reply', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ clientId: currentClientId, phone: currentPhone, message })
      });
      loadMessages(currentPhone, true);
    } catch (e) {}
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendReply();
    }
  }

  function showList() {
    document.getElementById('convList').classList.remove('hidden');
    document.getElementById('chatPanel').classList.remove('visible');
    currentPhone = null;
  }

  function getInitials(name) {
    if (!name || name === 'Unknown' || name === 'there') return '?';
    return name.trim().split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
  }

  function formatTime(time) {
    if (!time) return '';
    const d = new Date(time);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString([], { day: 'numeric', month: 'short' });
  }

  function escapeHtml(text) {
    if (!text) return '';
    return String(text).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>
</body>
  </html>
